services:
  mysql:
    image: mysql:8.4
    container_name: scenego-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: scenego
      MYSQL_USER: scenego
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root-password
    ports:
      - "3306:3306"
    volumes:
      - scenego-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot-password --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  scenego-mysql-data:

